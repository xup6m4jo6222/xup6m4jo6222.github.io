<!DOCTYPE html>
<html lang="zh-Hant" style="color-scheme:dark">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>過場簡化版</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600&family=Noto+Sans+TC:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--a:#a295bb;--bg:#16181a;--alt:#1e2124;--muted:#93958e;--line:#2c2f31}
body{margin:0;background:var(--bg);color:#e8e6e0;font-family:'Noto Sans TC',system-ui,'Microsoft JhengHei',sans-serif;line-height:1.65;padding:2.5rem 1.25rem;display:grid;place-items:center}
.wrap{max-width:720px;width:100%}
h1{font-family:'Noto Serif TC',serif;font-weight:400;letter-spacing:.06em;font-size:1.5rem;margin:0 0 .3rem}
.note{color:var(--muted);font-size:.88rem;margin:0 0 1.6rem}
.opt{border:1px solid var(--line);border-radius:.55rem;background:#191c1e;padding:1.1rem 1.3rem;margin-bottom:1.2rem}
.tag{font-size:.78rem;color:var(--a);letter-spacing:.06em;margin-bottom:.55rem}
.tag small{color:var(--muted);margin-left:.5rem;letter-spacing:0}
.btn{display:inline-block;border:1px solid var(--a);color:var(--a);background:none;border-radius:.55rem;padding:.35rem .95rem;font-size:.82rem;font-family:inherit;cursor:pointer;transition:background .18s ease,color .18s ease}
.btn:hover{background:color-mix(in srgb,var(--a) 14%,transparent)}
.btn:active{background:var(--a);color:#16181a}
.pagebox{position:relative;height:5rem;margin-top:.6rem;max-width:26rem;overflow:hidden;border-radius:.55rem}
.pg{position:absolute;inset:0;display:grid;place-items:center;background:var(--alt);font-size:.9rem}
.veil{position:absolute;inset:0;background:#0d0e10;opacity:0;pointer-events:none}
</style>
</head>
<body>
<div style="background:#101214;color:#93958e;font:400 .8rem/1.7 system-ui,'Microsoft JhengHei',sans-serif;padding:.55rem 1rem;border-bottom:1px solid #2c2f31;letter-spacing:.02em;width:100%;box-sizing:border-box">過程原件・未修飾　|　我的裁決：簡丙 快速交叉　|　<a href="/projects/ai/portfolio-site/" style="color:#a295bb">回專案頁</a></div>
<div class="wrap">
<h1>過場簡化版</h1>
<p class="note">墨點的方向保留，儀式感降兩級。三案總時長都壓在 0.3 秒內，換頁不再有「等一下」的感覺。</p>

<div class="opt"><div class="tag">簡甲　眨墨<small>墨點的極簡版：黑只閃 0.12 秒，像眨一次眼，意象還在但幾乎無感</small></div><button class="btn" onclick="blink(this)">模擬</button><div class="pagebox"><div class="pg p1">首頁</div><div class="pg p2" style="opacity:0">Projects</div><div class="veil"></div></div></div>

<div class="opt"><div class="tag">簡乙　新頁浮現<small>舊頁直接走、新頁 0.25 秒淡入，只有一半的動作，最接近「無過場」的有過場</small></div><button class="btn" onclick="fadein(this)">模擬</button><div class="pagebox"><div class="pg p1">首頁</div><div class="pg p2" style="opacity:0">Projects</div></div></div>

<div class="opt"><div class="tag">簡丙　快速交叉<small>兩頁 0.25 秒交叉淡化，無黑幕，最柔</small></div><button class="btn" onclick="xf(this)">模擬</button><div class="pagebox"><div class="pg p1">首頁</div><div class="pg p2" style="opacity:0">Projects</div></div></div>

</div>
<script>
function blink(btn){const w=btn.parentElement.querySelector('.pagebox');const v=w.querySelector('.veil'),p1=w.querySelector('.p1'),p2=w.querySelector('.p2');v.style.transition='opacity .1s ease';p1.style.opacity=1;p2.style.opacity=0;v.style.opacity=1;setTimeout(()=>{p1.style.opacity=0;p2.style.opacity=1;v.style.transition='opacity .18s ease';v.style.opacity=0},120);setTimeout(()=>{p2.style.opacity=0;p1.style.opacity=1},1800)}
function fadein(btn){const w=btn.parentElement.querySelector('.pagebox');const p1=w.querySelector('.p1'),p2=w.querySelector('.p2');p1.style.transition='none';p2.style.transition='opacity .25s ease';p1.style.opacity=0;p2.style.opacity=0;void p2.offsetWidth;requestAnimationFrame(()=>p2.style.opacity=1);setTimeout(()=>{p2.style.opacity=0;p1.style.transition='opacity .2s ease';p1.style.opacity=1},1800)}
function xf(btn){const w=btn.parentElement.querySelector('.pagebox');const p1=w.querySelector('.p1'),p2=w.querySelector('.p2');p1.style.transition=p2.style.transition='opacity .25s ease';p1.style.opacity=0;p2.style.opacity=1;setTimeout(()=>{p1.style.opacity=1;p2.style.opacity=0},1800)}
</script>
</body>
</html>
